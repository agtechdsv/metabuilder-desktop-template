name: Build Desktop App (MSI)

# Este workflow é acionado APENAS pela API do MetaBuilder PRO
on:
  repository_dispatch:
    types: [build-desktop-app]

jobs:
  build-and-upload:
    runs-on: windows-latest
    
    steps:
      - name: Checkout Template Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo and Node Modules
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
            node_modules
          key: ${{ runner.os }}-tauri-build-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('package-lock.json') }}

      - name: Install Frontend Dependencies
        run: npm install

      - name: Customize App Metadata (White-Label)
        shell: pwsh
        run: |
          $AppName = "${{ github.event.client_payload.appName }}"
          # Remove caracteres especiais e gera um subdomínio válido
          $CleanName = $AppName -replace '[^a-zA-Z0-9]', ''
          if (-not $CleanName) { $CleanName = "app" }
          $NewId = "com.metabuilder.$CleanName".ToLower()
          
          # Altera as configurações do Tauri no tauri.conf.json antes do Build
          $ConfPath = "src-tauri/tauri.conf.json"
          (Get-Content $ConfPath) `
            -replace '"com.tauri.dev"', ('"' + $NewId + '"') `
            -replace '"MetaBuilder Template"', ('"' + $AppName + '"') `
            -replace '"MetaBuilder App"', ('"' + $AppName + '"') `
            | Set-Content $ConfPath
            
          Write-Output "Novo identificador configurado: $NewId"
          Write-Output "Novo nome de exibição: $AppName"

          # Processa o ícone se o usuário tiver feito upload
          $IconBase64 = "${{ github.event.client_payload.iconBase64 }}"
          if ($IconBase64 -and $IconBase64 -ne "null" -and $IconBase64.Trim() -ne "") {
            Write-Output "Decodificando ícone personalizado..."
            # Remove o cabeçalho base64 se presente
            if ($IconBase64.Contains("base64,")) {
              $IconBase64 = $IconBase64.Substring($IconBase64.IndexOf("base64,") + 7)
            }
            try {
              $Bytes = [Convert]::FromBase64String($IconBase64)
              [IO.File]::WriteAllBytes("src-tauri/custom-icon.png", $Bytes)
              
              Write-Output "Executando tauri icon para gerar formatos .ico, .icns e pngs..."
              npx tauri icon src-tauri/custom-icon.png
              Write-Output "Ícones gerados com sucesso."
            } catch {
              Write-Error "Falha ao decodificar ou gerar ícone: $_"
            }
          } else {
            Write-Output "Nenhum ícone personalizado fornecido. Usando ícone padrão do MetaBuilder PRO."
          }

      - name: Build Tauri App (MSI)
        run: npx tauri build
        env:
          NEXT_PUBLIC_TUNNEL_URL: ${{ github.event.client_payload.tunnelUrl }}
          NEXT_PUBLIC_APP_NAME: ${{ github.event.client_payload.appName }}

      - name: Upload MSI to Supabase Storage
        id: upload
        shell: pwsh
        env:
          SUPABASE_URL: "https://chmstvtepzmjhpyxjjam.supabase.co" # Substitua pela sua URL
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BUILD_ID: ${{ github.event.client_payload.buildId }}
        run: |
          # 1. Localiza o arquivo MSI gerado
          $MsiPath = Get-ChildItem -Path "src-tauri/target/release/bundle/msi/*.msi" | Select-Object -First 1
          if (-not $MsiPath) { throw "MSI não encontrado!" }
          
          # 2. Define o nome no bucket usando o ID do build para evitar colisão
          $FileName = "desktop-builds/${env:BUILD_ID}/" + $MsiPath.Name
          
          # 3. Faz o Upload via REST API do Supabase Storage
          $Uri = "${env:SUPABASE_URL}/storage/v1/object/releases/$FileName"
          
          $Response = Invoke-RestMethod -Uri $Uri -Method Post -Headers @{
            "Authorization" = "Bearer ${env:SUPABASE_KEY}"
          } -InFile $MsiPath.FullName -ContentType "application/octet-stream"
          
          # 4. Retorna a URL pública gerada
          $DownloadUrl = "${env:SUPABASE_URL}/storage/v1/object/public/releases/$FileName"
          echo "DOWNLOAD_URL=$DownloadUrl" >> $env:GITHUB_ENV
          Write-Output "Upload concluído: $DownloadUrl"

      - name: Call Webhook API (Success)
        if: success()
        shell: pwsh
        run: |
          $WebhookUrl = "https://metabuilderpro.com/api/build-desktop-webhook" # Substitua pela URL da sua Vercel
          
          # 1. Localiza o arquivo MSI gerado para pegar as propriedades
          $MsiPath = Get-ChildItem -Path "src-tauri/target/release/bundle/msi/*.msi" | Select-Object -First 1
          $SizeBytes = if ($MsiPath) { $MsiPath.Length } else { 0 }
          
          $Body = @{
            buildId = "${{ github.event.client_payload.buildId }}"
            status = "success"
            downloadUrl = $env:DOWNLOAD_URL
            sizeBytes = $SizeBytes
          } | ConvertTo-Json
          
          Invoke-RestMethod -Uri $WebhookUrl -Method Post -Body $Body -ContentType "application/json"

      - name: Call Webhook API (Failure)
        if: failure()
        shell: pwsh
        run: |
          $WebhookUrl = "https://metabuilderpro.com/api/build-desktop-webhook" # Substitua pela URL da sua Vercel
          
          $Body = @{
            buildId = "${{ github.event.client_payload.buildId }}"
            status = "error"
            errorMsg = "Falha durante o build no Github Actions."
          } | ConvertTo-Json
          
          Invoke-RestMethod -Uri $WebhookUrl -Method Post -Body $Body -ContentType "application/json"
