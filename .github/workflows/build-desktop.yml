name: Build White-Label Desktop App

on:
  repository_dispatch:
    types: [build-desktop-app]

jobs:
  build-msi:
    runs-on: windows-latest
    
    steps:
      - name: Checkout Template Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Parse Payload and Prepare Environment
        run: |
          echo "App Name: ${{ github.event.client_payload.appName }}"
          echo "Context Type: ${{ github.event.client_payload.contextType }}"
          
          # Escrever arquivo .env
          echo "NEXT_PUBLIC_APP_NAME=${{ github.event.client_payload.appName }}" > .env.production
          echo "NEXT_PUBLIC_TUNNEL_URL=${{ github.event.client_payload.tunnelUrl }}" >> .env.production
          echo "NEXT_PUBLIC_DB_CONNECTION=${{ github.event.client_payload.dbConnectionString }}" >> .env.production
        shell: bash

      - name: Install NPM Dependencies
        run: npm install

      - name: Update Tauri Configuration
        run: |
          node scripts/update-tauri.js "${{ github.event.client_payload.appName }}"
        shell: bash

      - name: Process Icon
        run: |
          node scripts/process-icon.js "${{ github.event.client_payload.iconBase64 }}"
          if [ -f "scripts/temp-icon.png" ]; then
            npx tauri icon scripts/temp-icon.png
          fi
        shell: bash

      - name: Build Next.js
        run: npm run build

      - name: Build Tauri App (MSI)
        run: npx tauri build
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.client_payload.appName }} Setup
          path: src-tauri/target/release/bundle/msi/*.msi
